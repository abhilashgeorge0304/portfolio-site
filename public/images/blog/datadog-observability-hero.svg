<svg width="100%" viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" style="max-width: 760px; margin: 2rem auto; display: block">
  
  <rect x="20" y="20" width="720" height="320" rx="12" fill="#2C3E50" opacity="0.06" stroke="#2C3E50" stroke-width="1.2"/>
  <text x="380" y="50" text-anchor="middle" font-size="12" font-weight="600" fill="#2C3E50" font-family="sans-serif" letter-spacing="1.5">VIRTUAL MACHINE</text>

  
  <rect x="40" y="70" width="330" height="250" rx="8" fill="#1F4E79"/>
  <text x="205" y="96" text-anchor="middle" font-size="12" font-weight="600" fill="#f9fafb" font-family="sans-serif">Alert Processing Pipeline</text>
  <line x1="55" y1="106" x2="355" y2="106" stroke="#a8c4e0" stroke-width="0.4"/>

  <text x="205" y="126" text-anchor="middle" font-size="10" fill="#a8c4e0" font-family="sans-serif">main.py → orchestrates all processors in parallel</text>

  <rect x="56" y="140" width="145" height="42" rx="5" fill="#1F4E79" stroke="#a8c4e0" stroke-width="0.5"/>
  <text x="128" y="158" text-anchor="middle" font-size="9" font-weight="500" fill="#a8c4e0" font-family="sans-serif">Platform A Processor</text>
  <text x="128" y="172" text-anchor="middle" font-size="8" fill="#7ba3c4" font-family="sans-serif">fetch → parse → JSON → push</text>

  <rect x="210" y="140" width="145" height="42" rx="5" fill="#1F4E79" stroke="#a8c4e0" stroke-width="0.5"/>
  <text x="282" y="158" text-anchor="middle" font-size="9" font-weight="500" fill="#a8c4e0" font-family="sans-serif">Platform B Processor</text>
  <text x="282" y="172" text-anchor="middle" font-size="8" fill="#7ba3c4" font-family="sans-serif">fetch → parse → uptime → push</text>

  <rect x="56" y="190" width="145" height="42" rx="5" fill="#1F4E79" stroke="#a8c4e0" stroke-width="0.5"/>
  <text x="128" y="208" text-anchor="middle" font-size="9" font-weight="500" fill="#a8c4e0" font-family="sans-serif">Platform C Processor</text>
  <text x="128" y="222" text-anchor="middle" font-size="8" fill="#7ba3c4" font-family="sans-serif">fetch → parse → JSON → push</text>

  <rect x="210" y="190" width="145" height="42" rx="5" fill="#1F4E79" stroke="#a8c4e0" stroke-width="0.5"/>
  <text x="282" y="208" text-anchor="middle" font-size="9" font-weight="500" fill="#a8c4e0" font-family="sans-serif">Platform D Processor</text>
  <text x="282" y="222" text-anchor="middle" font-size="8" fill="#7ba3c4" font-family="sans-serif">fetch → parse → uptime → push</text>

  <text x="205" y="252" text-anchor="middle" font-size="9" fill="#7ba3c4" font-family="sans-serif">+ 3 more platform processors</text>

  <rect x="56" y="264" width="300" height="38" rx="5" fill="#183D5E" stroke="#a8c4e0" stroke-width="0.3"/>
  <text x="206" y="280" text-anchor="middle" font-size="9" fill="#a8c4e0" font-family="sans-serif">core/ — utilities, SQLite DB, logging &amp; alerting</text>
  <text x="206" y="294" text-anchor="middle" font-size="9" fill="#a8c4e0" font-family="sans-serif">services/ — email API, monitoring API wrappers</text>

  
  <rect x="400" y="70" width="320" height="250" rx="8" fill="#2A7F62"/>
  <text x="560" y="96" text-anchor="middle" font-size="12" font-weight="600" fill="#f9fafb" font-family="sans-serif">Data Ingestion Pipeline</text>
  <line x1="415" y1="106" x2="705" y2="106" stroke="#a8dfc9" stroke-width="0.4"/>

  <rect x="416" y="120" width="288" height="36" rx="5" fill="#2A7F62" stroke="#a8dfc9" stroke-width="0.5"/>
  <text x="560" y="138" text-anchor="middle" font-size="9.5" fill="#a8dfc9" font-family="sans-serif">ERP → CSV files → cloud storage (every 30 min)</text>
  <text x="560" y="150" text-anchor="middle" font-size="8" fill="#7bc4a8" font-family="sans-serif">Windows encoding format</text>

  <text x="560" y="175" text-anchor="middle" font-size="10" fill="#a8dfc9" font-family="sans-serif">↓</text>

  <rect x="416" y="182" width="288" height="36" rx="5" fill="#2A7F62" stroke="#a8dfc9" stroke-width="0.5"/>
  <text x="560" y="200" text-anchor="middle" font-size="9.5" fill="#a8dfc9" font-family="sans-serif">Scheduled script downloads &amp; transforms</text>
  <text x="560" y="212" text-anchor="middle" font-size="8" fill="#7bc4a8" font-family="sans-serif">Windows encoding → UTF-8 / LF line endings</text>

  <text x="560" y="237" text-anchor="middle" font-size="10" fill="#a8dfc9" font-family="sans-serif">↓</text>

  <rect x="416" y="244" width="288" height="36" rx="5" fill="#2A7F62" stroke="#a8dfc9" stroke-width="0.5"/>
  <text x="560" y="262" text-anchor="middle" font-size="9.5" fill="#a8dfc9" font-family="sans-serif">Load into cloud data warehouse</text>
  <text x="560" y="274" text-anchor="middle" font-size="8" fill="#7bc4a8" font-family="sans-serif">Pipes, streams, and tasks for ingestion</text>

  <rect x="416" y="290" width="288" height="20" rx="4" fill="#1E6B50"/>
  <text x="560" y="304" text-anchor="middle" font-size="8" fill="#a8dfc9" font-family="sans-serif">Failure modes: encoding, missing files, malformed CSV, connectivity</text>
</svg>