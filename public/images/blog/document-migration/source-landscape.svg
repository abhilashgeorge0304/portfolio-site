<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="ds2" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1F4E79" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="hg2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <linearGradient id="cg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="#f9fafb" rx="12"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="56" fill="url(#hg2)" rx="12"/>
  <rect x="0" y="28" width="900" height="28" fill="url(#hg2)"/>
  <text x="450" y="36" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.5">The Fragmented Document Landscape — Five Source Systems, 25+ Years</text>

  <!-- Timeline bar -->
  <rect x="50" y="75" width="800" height="28" rx="4" fill="#e8f0fe"/>
  <text x="90" y="93" fill="#1F4E79" font-size="10" font-weight="600">1997</text>
  <text x="250" y="93" fill="#1F4E79" font-size="10" font-weight="600">2005</text>
  <text x="410" y="93" fill="#1F4E79" font-size="10" font-weight="600">2010</text>
  <text x="570" y="93" fill="#1F4E79" font-size="10" font-weight="600">2017</text>
  <text x="730" y="93" fill="#1F4E79" font-size="10" font-weight="600">2024</text>
  <!-- Tick marks -->
  <line x1="90" y1="98" x2="90" y2="103" stroke="#1F4E79" stroke-width="1.5"/>
  <line x1="250" y1="98" x2="250" y2="103" stroke="#1F4E79" stroke-width="1.5"/>
  <line x1="410" y1="98" x2="410" y2="103" stroke="#1F4E79" stroke-width="1.5"/>
  <line x1="570" y1="98" x2="570" y2="103" stroke="#1F4E79" stroke-width="1.5"/>
  <line x1="730" y1="98" x2="730" y2="103" stroke="#1F4E79" stroke-width="1.5"/>

  <!-- Source 1: Origination System -->
  <g filter="url(#ds2)">
    <rect x="30" y="120" width="260" height="165" rx="8" fill="url(#cg2)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="30" y="120" width="260" height="40" rx="8" fill="#1F4E79"/>
    <rect x="30" y="145" width="260" height="15" fill="#1F4E79"/>
    <text x="160" y="146" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Loan Origination System</text>
  </g>
  <text x="50" y="183" fill="#2C3E50" font-size="10.5" font-weight="600">Format:</text>
  <text x="105" y="183" fill="#2C3E50" font-size="10.5">SQL Server / relational</text>
  <text x="50" y="200" fill="#2C3E50" font-size="10.5" font-weight="600">Metadata:</text>
  <text x="115" y="200" fill="#2C3E50" font-size="10.5">Application ID, Loan ID</text>
  <text x="50" y="217" fill="#2C3E50" font-size="10.5" font-weight="600">Coverage:</text>
  <text x="115" y="217" fill="#2C3E50" font-size="10.5">PNotes, Addendums</text>
  <rect x="50" y="230" width="80" height="18" rx="3" fill="#fff5f5" stroke="#c0392b" stroke-width="0.8"/>
  <text x="90" y="243" text-anchor="middle" fill="#c0392b" font-size="9" font-weight="600">Gap: Pre-2017</text>
  <rect x="140" y="230" width="130" height="18" rx="3" fill="#e8f5f0" stroke="#2A7F62" stroke-width="0.8"/>
  <text x="205" y="243" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="600">eSign era: post-2018</text>
  <text x="50" y="270" fill="#7f8c8d" font-size="9.5" font-style="italic">~2.5M documents, batch-generated</text>

  <!-- Source 2: Servicing Platform -->
  <g filter="url(#ds2)">
    <rect x="310" y="120" width="260" height="165" rx="8" fill="url(#cg2)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="310" y="120" width="260" height="40" rx="8" fill="#1F4E79"/>
    <rect x="310" y="145" width="260" height="15" fill="#1F4E79"/>
    <text x="440" y="146" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Servicing Platform</text>
  </g>
  <text x="330" y="183" fill="#2C3E50" font-size="10.5" font-weight="600">Format:</text>
  <text x="385" y="183" fill="#2C3E50" font-size="10.5">Oracle / statements engine</text>
  <text x="330" y="200" fill="#2C3E50" font-size="10.5" font-weight="600">Metadata:</text>
  <text x="395" y="200" fill="#2C3E50" font-size="10.5">CIF, Account Number</text>
  <text x="330" y="217" fill="#2C3E50" font-size="10.5" font-weight="600">Coverage:</text>
  <text x="395" y="217" fill="#2C3E50" font-size="10.5">Statements, Disclosures</text>
  <rect x="330" y="230" width="105" height="18" rx="3" fill="#e8f5f0" stroke="#2A7F62" stroke-width="0.8"/>
  <text x="382" y="243" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="600">Well-structured</text>
  <text x="330" y="270" fill="#7f8c8d" font-size="9.5" font-style="italic">~157M documents, automated triggers</text>

  <!-- Source 3: Document Management -->
  <g filter="url(#ds2)">
    <rect x="590" y="120" width="280" height="165" rx="8" fill="url(#cg2)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="590" y="120" width="280" height="40" rx="8" fill="#1F4E79"/>
    <rect x="590" y="145" width="280" height="15" fill="#1F4E79"/>
    <text x="730" y="146" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Content Management System</text>
  </g>
  <text x="610" y="183" fill="#2C3E50" font-size="10.5" font-weight="600">Format:</text>
  <text x="665" y="183" fill="#2C3E50" font-size="10.5">Oracle DB + image store</text>
  <text x="610" y="200" fill="#2C3E50" font-size="10.5" font-weight="600">Metadata:</text>
  <text x="675" y="200" fill="#2C3E50" font-size="10.5">Free-form categories, SSN</text>
  <text x="610" y="217" fill="#2C3E50" font-size="10.5" font-weight="600">Coverage:</text>
  <text x="675" y="217" fill="#2C3E50" font-size="10.5">Inbound mail, agent uploads</text>
  <rect x="610" y="230" width="120" height="18" rx="3" fill="#fff5f5" stroke="#c0392b" stroke-width="0.8"/>
  <text x="670" y="243" text-anchor="middle" fill="#c0392b" font-size="9" font-weight="600">Inconsistent tagging</text>
  <text x="610" y="270" fill="#7f8c8d" font-size="9.5" font-style="italic">~18M documents, manual + automated</text>

  <!-- Source 4: External Vendor -->
  <g filter="url(#ds2)">
    <rect x="30" y="305" width="260" height="165" rx="8" fill="url(#cg2)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="30" y="305" width="260" height="40" rx="8" fill="#1F4E79"/>
    <rect x="30" y="330" width="260" height="15" fill="#1F4E79"/>
    <text x="160" y="331" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">External Print Vendor</text>
  </g>
  <text x="50" y="368" fill="#2C3E50" font-size="10.5" font-weight="600">Format:</text>
  <text x="105" y="368" fill="#2C3E50" font-size="10.5">Daily bulk PDF files</text>
  <text x="50" y="385" fill="#2C3E50" font-size="10.5" font-weight="600">Metadata:</text>
  <text x="115" y="385" fill="#2C3E50" font-size="10.5">Bundled, minimal indexing</text>
  <text x="50" y="402" fill="#2C3E50" font-size="10.5" font-weight="600">Coverage:</text>
  <text x="115" y="402" fill="#2C3E50" font-size="10.5">Final Disclosures, Ad hoc letters</text>
  <rect x="50" y="415" width="130" height="18" rx="3" fill="#fff5f5" stroke="#c0392b" stroke-width="0.8"/>
  <text x="115" y="428" text-anchor="middle" fill="#c0392b" font-size="9" font-weight="600">Needs PDF splitting</text>
  <text x="50" y="455" fill="#7f8c8d" font-size="9.5" font-style="italic">~6M documents, 2010–2018 vintage</text>

  <!-- Source 5: Document Vault -->
  <g filter="url(#ds2)">
    <rect x="310" y="305" width="260" height="165" rx="8" fill="url(#cg2)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="310" y="305" width="260" height="40" rx="8" fill="#1F4E79"/>
    <rect x="310" y="330" width="260" height="15" fill="#1F4E79"/>
    <text x="440" y="331" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Enterprise Document Vault</text>
  </g>
  <text x="330" y="368" fill="#2C3E50" font-size="10.5" font-weight="600">Format:</text>
  <text x="385" y="368" fill="#2C3E50" font-size="10.5">AFP / on-premise archive</text>
  <text x="330" y="385" fill="#2C3E50" font-size="10.5" font-weight="600">Metadata:</text>
  <text x="395" y="385" fill="#2C3E50" font-size="10.5">CIF-indexed, date-batched</text>
  <text x="330" y="402" fill="#2C3E50" font-size="10.5" font-weight="600">Coverage:</text>
  <text x="395" y="402" fill="#2C3E50" font-size="10.5">All Finacle-triggered letters</text>
  <rect x="330" y="415" width="140" height="18" rx="3" fill="#fef9e7" stroke="#d4a017" stroke-width="0.8"/>
  <text x="400" y="428" text-anchor="middle" fill="#8a6d00" font-size="9" font-weight="600">API-only access (IBM)</text>
  <text x="330" y="455" fill="#7f8c8d" font-size="9.5" font-style="italic">~13M documents, highest completeness</text>

  <!-- Summary panel -->
  <g filter="url(#ds2)">
    <rect x="590" y="305" width="280" height="165" rx="8" fill="#1F4E79"/>
    <text x="730" y="335" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">The Core Challenge</text>
    <line x1="620" y1="345" x2="840" y2="345" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <text x="620" y="370" fill="#c8dff0" font-size="11">• 5+ source systems</text>
    <text x="620" y="390" fill="#c8dff0" font-size="11">• ~200M total documents</text>
    <text x="620" y="410" fill="#c8dff0" font-size="11">• ~2M borrower accounts</text>
    <text x="620" y="430" fill="#c8dff0" font-size="11">• 25+ years of originations</text>
    <text x="620" y="450" fill="#c8dff0" font-size="11">• No unified document index</text>
  </g>

  <!-- Bottom annotation -->
  <rect x="590" y="478" width="280" height="22" rx="4" fill="#e8f5f0"/>
  <text x="730" y="493" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="600">Each system had its own ID scheme, tagging taxonomy, and storage format</text>
</svg>
