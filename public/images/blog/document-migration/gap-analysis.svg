<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="ds7" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F4E79" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hg7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <linearGradient id="cg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
  </defs>

  <rect width="920" height="400" fill="#f9fafb" rx="12"/>

  <!-- Title -->
  <rect x="0" y="0" width="920" height="56" fill="url(#hg7)" rx="12"/>
  <rect x="0" y="28" width="920" height="28" fill="url(#hg7)"/>
  <text x="460" y="36" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.5">Mandatory Document Inventory — Gap Identification Framework</text>

  <!-- Left: Mandatory checklist -->
  <g filter="url(#ds7)">
    <rect x="30" y="75" width="260" height="300" rx="8" fill="url(#cg7)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="30" y="75" width="260" height="38" rx="8" fill="#1F4E79"/>
    <rect x="30" y="100" width="260" height="13" fill="#1F4E79"/>
    <text x="160" y="99" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Mandatory Document Checklist</text>
  </g>

  <!-- Priority 1 docs -->
  <text x="50" y="134" fill="#c0392b" font-size="10" font-weight="700">PRIORITY 1 — Day of Transfer</text>
  <line x1="50" y1="140" x2="270" y2="140" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Checkmark items -->
  <rect x="50" y="150" width="14" height="14" rx="2" fill="#2A7F62"/>
  <text x="57" y="161" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">✓</text>
  <text x="74" y="161" fill="#2C3E50" font-size="10.5">Promissory Note</text>

  <rect x="50" y="172" width="14" height="14" rx="2" fill="#2A7F62"/>
  <text x="57" y="183" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">✓</text>
  <text x="74" y="183" fill="#2C3E50" font-size="10.5">Cosigner Addendum</text>

  <rect x="50" y="194" width="14" height="14" rx="2" fill="#2A7F62"/>
  <text x="57" y="205" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">✓</text>
  <text x="74" y="205" fill="#2C3E50" font-size="10.5">Final Disclosure (Borrower)</text>

  <rect x="50" y="216" width="14" height="14" rx="2" fill="#2A7F62"/>
  <text x="57" y="227" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">✓</text>
  <text x="74" y="227" fill="#2C3E50" font-size="10.5">Final Disclosure (Cosigner)</text>

  <rect x="50" y="238" width="14" height="14" rx="2" fill="#2A7F62"/>
  <text x="57" y="249" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">✓</text>
  <text x="74" y="249" fill="#2C3E50" font-size="10.5">Tax Form (W-9S)</text>

  <rect x="50" y="260" width="14" height="14" rx="2" fill="#2A7F62"/>
  <text x="57" y="271" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="700">✓</text>
  <text x="74" y="271" fill="#2C3E50" font-size="10.5">Statements</text>

  <!-- Priority 2 -->
  <text x="50" y="302" fill="#d4a017" font-size="10" font-weight="700">PRIORITY 2 — Within 45 Days</text>
  <line x1="50" y1="308" x2="270" y2="308" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="325" fill="#7f8c8d" font-size="10">Privacy policies, tax docs (1099E),</text>
  <text x="50" y="340" fill="#7f8c8d" font-size="10">collections &amp; recovery documents</text>
  <text x="50" y="360" fill="#7f8c8d" font-size="9.5" font-style="italic">+ custom grad addendums where applicable</text>

  <!-- Middle: Gap matrix concept -->
  <g filter="url(#ds7)">
    <rect x="310" y="75" width="300" height="300" rx="8" fill="url(#cg7)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="310" y="75" width="300" height="38" rx="8" fill="#1F4E79"/>
    <rect x="310" y="100" width="300" height="13" fill="#1F4E79"/>
    <text x="460" y="99" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Gap Matrix — Account × Document Type</text>
  </g>

  <!-- Mini table header -->
  <rect x="325" y="125" width="270" height="22" rx="3" fill="#1F4E79"/>
  <text x="365" y="140" text-anchor="middle" fill="#ffffff" font-size="8.5" font-weight="600">Account</text>
  <text x="425" y="140" text-anchor="middle" fill="#ffffff" font-size="8.5" font-weight="600">PNote</text>
  <text x="475" y="140" text-anchor="middle" fill="#ffffff" font-size="8.5" font-weight="600">Discl.</text>
  <text x="525" y="140" text-anchor="middle" fill="#ffffff" font-size="8.5" font-weight="600">Adden.</text>
  <text x="575" y="140" text-anchor="middle" fill="#ffffff" font-size="8.5" font-weight="600">Stmt</text>

  <!-- Row 1: All found -->
  <rect x="325" y="147" width="270" height="20" rx="0" fill="#e8f5f0"/>
  <text x="365" y="161" text-anchor="middle" fill="#2C3E50" font-size="9">Acct #1</text>
  <text x="425" y="161" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="700">✓</text>
  <text x="475" y="161" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="700">✓</text>
  <text x="525" y="161" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="700">✓</text>
  <text x="575" y="161" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="700">✓</text>

  <!-- Row 2: Missing one -->
  <rect x="325" y="167" width="270" height="20" rx="0" fill="#ffffff"/>
  <text x="365" y="181" text-anchor="middle" fill="#2C3E50" font-size="9">Acct #2</text>
  <text x="425" y="181" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="700">✓</text>
  <text x="475" y="181" text-anchor="middle" fill="#c0392b" font-size="9" font-weight="700">✗</text>
  <text x="525" y="181" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="700">✓</text>
  <text x="575" y="181" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="700">✓</text>

  <!-- Row 3 -->
  <rect x="325" y="187" width="270" height="20" rx="0" fill="#e8f5f0"/>
  <text x="365" y="201" text-anchor="middle" fill="#2C3E50" font-size="9">Acct #3</text>
  <text x="425" y="201" text-anchor="middle" fill="#c0392b" font-size="9" font-weight="700">✗</text>
  <text x="475" y="201" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="700">✓</text>
  <text x="525" y="201" text-anchor="middle" fill="#c0392b" font-size="9" font-weight="700">✗</text>
  <text x="575" y="201" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="700">✓</text>

  <!-- Row 4 -->
  <rect x="325" y="207" width="270" height="20" rx="0" fill="#ffffff"/>
  <text x="365" y="221" text-anchor="middle" fill="#2C3E50" font-size="9">Acct #4</text>
  <text x="425" y="221" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="700">✓</text>
  <text x="475" y="221" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="700">✓</text>
  <text x="525" y="221" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="700">✓</text>
  <text x="575" y="221" text-anchor="middle" fill="#2A7F62" font-size="9" font-weight="700">✓</text>

  <!-- Ellipsis row -->
  <text x="460" y="242" text-anchor="middle" fill="#7f8c8d" font-size="10">⋮ (~2M rows)</text>

  <!-- Gap summary -->
  <rect x="330" y="258" width="265" height="100" rx="6" fill="#fff5f5" stroke="#c0392b" stroke-width="1"/>
  <text x="462" y="278" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="700">Gap Summary</text>
  <line x1="345" y1="285" x2="580" y2="285" stroke="#f5c6c6" stroke-width="0.8"/>
  <text x="345" y="302" fill="#2C3E50" font-size="10">Promissory Note gaps:</text>
  <text x="550" y="302" text-anchor="end" fill="#c0392b" font-size="10" font-weight="600">~2–8%</text>
  <text x="345" y="318" fill="#2C3E50" font-size="10">Cosigner Addendum gaps:</text>
  <text x="550" y="318" text-anchor="end" fill="#c0392b" font-size="10" font-weight="600">~3–15%</text>
  <text x="345" y="334" fill="#2C3E50" font-size="10">Disclosure gaps:</text>
  <text x="550" y="334" text-anchor="end" fill="#c0392b" font-size="10" font-weight="600">~0–12%</text>
  <text x="345" y="350" fill="#7f8c8d" font-size="9" font-style="italic">Gap rates varied dramatically by vintage year</text>

  <!-- Right: Resolution path -->
  <g filter="url(#ds7)">
    <rect x="630" y="75" width="270" height="300" rx="8" fill="url(#cg7)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="630" y="75" width="270" height="38" rx="8" fill="#1F4E79"/>
    <rect x="630" y="100" width="270" height="13" fill="#1F4E79"/>
    <text x="765" y="99" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Gap Resolution Waterfall</text>
  </g>

  <!-- Resolution steps as cascading bars -->
  <text x="650" y="134" fill="#2C3E50" font-size="10" font-weight="600">Starting gap population</text>
  <rect x="650" y="140" width="230" height="16" rx="3" fill="#c0392b" opacity="0.7"/>
  <text x="765" y="153" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="600">100% of gaps</text>

  <text x="650" y="176" fill="#2C3E50" font-size="10" font-weight="600">After cross-source metadata reconciliation</text>
  <rect x="650" y="182" width="138" height="16" rx="3" fill="#d4a017"/>
  <text x="719" y="195" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="600">~60%</text>

  <text x="650" y="218" fill="#2C3E50" font-size="10" font-weight="600">After document re-creation from templates</text>
  <rect x="650" y="224" width="92" height="16" rx="3" fill="#e67e22"/>
  <text x="696" y="237" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="600">~40%</text>

  <text x="650" y="260" fill="#2C3E50" font-size="10" font-weight="600">After semantic search + RAG matching</text>
  <rect x="650" y="266" width="34" height="16" rx="3" fill="#2A7F62"/>
  <text x="667" y="279" text-anchor="middle" fill="#ffffff" font-size="8" font-weight="600">~15%</text>

  <text x="650" y="302" fill="#2C3E50" font-size="10" font-weight="600">After field operations / manual review</text>
  <rect x="650" y="308" width="11" height="16" rx="3" fill="#1F4E79"/>
  <text x="675" y="320" fill="#1F4E79" font-size="9" font-weight="600">&lt;5%</text>

  <rect x="650" y="340" width="230" height="22" rx="4" fill="#e8f5f0"/>
  <text x="765" y="355" text-anchor="middle" fill="#2A7F62" font-size="10" font-weight="600">Target: residual gaps &lt; regulatory threshold</text>
</svg>
