<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 400" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="ds3" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F4E79" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hg3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <linearGradient id="cg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
    <marker id="a3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1F4E79"/>
    </marker>
  </defs>

  <rect width="940" height="400" fill="#f9fafb" rx="12"/>

  <!-- Title -->
  <rect x="0" y="0" width="940" height="56" fill="url(#hg3)" rx="12"/>
  <rect x="0" y="28" width="940" height="28" fill="url(#hg3)"/>
  <text x="470" y="36" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.5">Four-Phase Migration Execution Framework</text>

  <!-- Phase 1: Load -->
  <g filter="url(#ds3)">
    <rect x="25" y="80" width="200" height="280" rx="10" fill="url(#cg3)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="25" y="80" width="200" height="48" rx="10" fill="#1F4E79"/>
    <rect x="25" y="110" width="200" height="18" fill="#1F4E79"/>
    <!-- Phase number circle -->
    <circle cx="60" cy="104" r="14" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="60" y="110" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">1</text>
    <text x="145" y="109" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Load</text>
  </g>
  <text x="125" y="150" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">Ingest All Metadata</text>
  <line x1="50" y1="157" x2="200" y2="157" stroke="#e2e8f0" stroke-width="1"/>
  <text x="45" y="177" fill="#2C3E50" font-size="10">• Extract metadata files from</text>
  <text x="55" y="192" fill="#2C3E50" font-size="10">each source system</text>
  <text x="45" y="212" fill="#2C3E50" font-size="10">• Push via secure file transfer</text>
  <text x="55" y="227" fill="#2C3E50" font-size="10">to data warehouse</text>
  <text x="45" y="247" fill="#2C3E50" font-size="10">• Standardize field formats</text>
  <text x="55" y="262" fill="#2C3E50" font-size="10">(dates, IDs, doc types)</text>
  <text x="45" y="282" fill="#2C3E50" font-size="10">• Resolve encoding &amp; tag</text>
  <text x="55" y="297" fill="#2C3E50" font-size="10">inconsistencies</text>
  <!-- Status bar -->
  <rect x="40" y="320" width="170" height="22" rx="4" fill="#2A7F62"/>
  <text x="125" y="335" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">Target: 100% sources loaded</text>

  <!-- Arrow 1→2 -->
  <line x1="225" y1="210" x2="250" y2="210" stroke="#1F4E79" stroke-width="2" marker-end="url(#a3)"/>

  <!-- Phase 2: Analyze Gaps -->
  <g filter="url(#ds3)">
    <rect x="255" y="80" width="200" height="280" rx="10" fill="url(#cg3)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="255" y="80" width="200" height="48" rx="10" fill="#1F4E79"/>
    <rect x="255" y="110" width="200" height="18" fill="#1F4E79"/>
    <circle cx="290" cy="104" r="14" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="290" y="110" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">2</text>
    <text x="375" y="109" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Analyze Gaps</text>
  </g>
  <text x="355" y="150" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">Match &amp; Identify Missing</text>
  <line x1="280" y1="157" x2="430" y2="157" stroke="#e2e8f0" stroke-width="1"/>
  <text x="275" y="177" fill="#2C3E50" font-size="10">• Run deterministic matching</text>
  <text x="285" y="192" fill="#2C3E50" font-size="10">(Customer ID + Doc Type)</text>
  <text x="275" y="212" fill="#2C3E50" font-size="10">• Compare matched inventory</text>
  <text x="285" y="227" fill="#2C3E50" font-size="10">against mandatory checklist</text>
  <text x="275" y="247" fill="#2C3E50" font-size="10">• Surface gaps by account,</text>
  <text x="285" y="262" fill="#2C3E50" font-size="10">document type, &amp; vintage</text>
  <text x="275" y="282" fill="#2C3E50" font-size="10">• Classify unmatched docs</text>
  <text x="285" y="297" fill="#2C3E50" font-size="10">for Tier 3 AI-assisted routing</text>
  <rect x="270" y="320" width="170" height="22" rx="4" fill="#d4a017"/>
  <text x="355" y="335" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">Target: close priority gaps</text>

  <!-- Arrow 2→3 -->
  <line x1="455" y1="210" x2="480" y2="210" stroke="#1F4E79" stroke-width="2" marker-end="url(#a3)"/>

  <!-- Phase 3: Centralize -->
  <g filter="url(#ds3)">
    <rect x="485" y="80" width="200" height="280" rx="10" fill="url(#cg3)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="485" y="80" width="200" height="48" rx="10" fill="#1F4E79"/>
    <rect x="485" y="110" width="200" height="18" fill="#1F4E79"/>
    <circle cx="520" cy="104" r="14" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="520" y="110" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">3</text>
    <text x="605" y="109" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Centralize</text>
  </g>
  <text x="585" y="150" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">Stage for Transfer</text>
  <line x1="510" y1="157" x2="660" y2="157" stroke="#e2e8f0" stroke-width="1"/>
  <text x="505" y="177" fill="#2C3E50" font-size="10">• Migrate physical documents</text>
  <text x="515" y="192" fill="#2C3E50" font-size="10">to centralized repository</text>
  <text x="505" y="212" fill="#2C3E50" font-size="10">• Convert formats (AFP→PDF,</text>
  <text x="515" y="227" fill="#2C3E50" font-size="10">flat file→structured)</text>
  <text x="505" y="247" fill="#2C3E50" font-size="10">• Generate transfer rosters</text>
  <text x="515" y="262" fill="#2C3E50" font-size="10">(EA80 industry standard)</text>
  <text x="505" y="282" fill="#2C3E50" font-size="10">• Create immutable metadata</text>
  <text x="515" y="297" fill="#2C3E50" font-size="10">table for audit trail</text>
  <rect x="500" y="320" width="170" height="22" rx="4" fill="#1F4E79"/>
  <text x="585" y="335" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">Target: audit-ready staging</text>

  <!-- Arrow 3→4 -->
  <line x1="685" y1="210" x2="710" y2="210" stroke="#1F4E79" stroke-width="2" marker-end="url(#a3)"/>

  <!-- Phase 4: Transfer -->
  <g filter="url(#ds3)">
    <rect x="715" y="80" width="200" height="280" rx="10" fill="url(#cg3)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="715" y="80" width="200" height="48" rx="10" fill="#1F4E79"/>
    <rect x="715" y="110" width="200" height="18" fill="#1F4E79"/>
    <circle cx="750" cy="104" r="14" fill="none" stroke="#ffffff" stroke-width="2"/>
    <text x="750" y="110" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">4</text>
    <text x="835" y="109" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Transfer</text>
  </g>
  <text x="815" y="150" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">Validate &amp; Ship</text>
  <line x1="740" y1="157" x2="890" y2="157" stroke="#e2e8f0" stroke-width="1"/>
  <text x="735" y="177" fill="#2C3E50" font-size="10">• Execute tranche-aligned</text>
  <text x="745" y="192" fill="#2C3E50" font-size="10">file transfers via SFTP</text>
  <text x="735" y="212" fill="#2C3E50" font-size="10">• Receiving servicer validates</text>
  <text x="745" y="227" fill="#2C3E50" font-size="10">file structure &amp; counts</text>
  <text x="735" y="247" fill="#2C3E50" font-size="10">• Reconcile transferred vs.</text>
  <text x="745" y="262" fill="#2C3E50" font-size="10">expected document counts</text>
  <text x="735" y="282" fill="#2C3E50" font-size="10">• Post-transfer validation</text>
  <text x="745" y="297" fill="#2C3E50" font-size="10">&amp; reconciliation reporting</text>
  <rect x="730" y="320" width="170" height="22" rx="4" fill="#2A7F62"/>
  <text x="815" y="335" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">Target: 100% reconciled</text>

  <!-- Bottom: Regulatory context -->
  <rect x="25" y="372" width="890" height="22" rx="4" fill="#e8f0fe"/>
  <text x="470" y="387" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="600">Priority documents (promissory notes, disclosures, addendums) required on Day 1 of transfer — all others within 45 days</text>
</svg>
