<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 420" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <filter id="ds" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F4E79" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1F4E79"/>
      <stop offset="100%" stop-color="#2A7F62"/>
    </linearGradient>
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1F4E79"/>
    </marker>
    <marker id="arrT" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2A7F62"/>
    </marker>
  </defs>

  <rect width="940" height="420" fill="#f9fafb" rx="12"/>

  <rect x="0" y="0" width="940" height="56" fill="url(#hg)" rx="12"/>
  <rect x="0" y="28" width="940" height="28" fill="url(#hg)"/>
  <text x="470" y="36" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700" letter-spacing="0.5">RAG-Enhanced Document Migration — End-to-End Pipeline</text>

  <!-- Phase labels -->
  <text x="110" y="88" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700" letter-spacing="1">FRAGMENTED</text>
  <text x="110" y="100" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700">SOURCES</text>
  <text x="310" y="88" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700" letter-spacing="1">METADATA</text>
  <text x="310" y="100" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700">GENERATION</text>
  <text x="510" y="88" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700" letter-spacing="1">GAP ANALYSIS</text>
  <text x="510" y="100" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700">&amp; MATCHING</text>
  <text x="700" y="88" text-anchor="middle" fill="#2A7F62" font-size="10" font-weight="700" letter-spacing="1">RAG PIPELINE</text>
  <text x="700" y="100" text-anchor="middle" fill="#2A7F62" font-size="10" font-weight="700">+ HITL REVIEW</text>
  <text x="870" y="88" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700" letter-spacing="1">VALIDATED</text>
  <text x="870" y="100" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="700">TRANSFER</text>

  <line x1="210" y1="75" x2="210" y2="400" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="410" y1="75" x2="410" y2="400" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="600" y1="75" x2="600" y2="400" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="795" y1="75" x2="795" y2="400" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Source systems -->
  <g filter="url(#ds)">
    <rect x="30" y="120" width="160" height="38" rx="6" fill="url(#cg)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="110" y="144" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">Originations System</text>
  </g>
  <g filter="url(#ds)">
    <rect x="30" y="170" width="160" height="38" rx="6" fill="url(#cg)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="110" y="194" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">Servicing Platform</text>
  </g>
  <g filter="url(#ds)">
    <rect x="30" y="220" width="160" height="38" rx="6" fill="url(#cg)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="110" y="244" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">Document Vault</text>
  </g>
  <g filter="url(#ds)">
    <rect x="30" y="270" width="160" height="38" rx="6" fill="url(#cg)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="110" y="294" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">External Vendor</text>
  </g>
  <g filter="url(#ds)">
    <rect x="30" y="320" width="160" height="38" rx="6" fill="url(#cg)" stroke="#1F4E79" stroke-width="1.2"/>
    <text x="110" y="344" text-anchor="middle" fill="#2C3E50" font-size="11" font-weight="600">Content Mgmt System</text>
  </g>

  <line x1="190" y1="139" x2="235" y2="210" stroke="#1F4E79" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="190" y1="189" x2="235" y2="210" stroke="#1F4E79" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="190" y1="239" x2="235" y2="235" stroke="#1F4E79" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="190" y1="289" x2="235" y2="255" stroke="#1F4E79" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="190" y1="339" x2="235" y2="265" stroke="#1F4E79" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Central Metadata -->
  <g filter="url(#ds)">
    <rect x="240" y="140" width="140" height="160" rx="8" fill="#1F4E79"/>
    <text x="310" y="170" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Central</text>
    <text x="310" y="187" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Metadata</text>
    <text x="310" y="204" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Repository</text>
    <line x1="260" y1="215" x2="360" y2="215" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
    <text x="310" y="235" text-anchor="middle" fill="#c8dff0" font-size="10">Customer ID</text>
    <text x="310" y="250" text-anchor="middle" fill="#c8dff0" font-size="10">Doc Type</text>
    <text x="310" y="265" text-anchor="middle" fill="#c8dff0" font-size="10">Source System</text>
    <text x="310" y="280" text-anchor="middle" fill="#c8dff0" font-size="10">Created Date</text>
  </g>

  <!-- Tiers 1 & 2 stats -->
  <g filter="url(#ds)">
    <rect x="240" y="320" width="140" height="60" rx="6" fill="url(#cg)" stroke="#2A7F62" stroke-width="1.5"/>
    <text x="310" y="342" text-anchor="middle" fill="#2A7F62" font-size="10" font-weight="700">TIERS 1 &amp; 2 MATCH</text>
    <text x="310" y="362" text-anchor="middle" fill="#2C3E50" font-size="20" font-weight="700">~97%</text>
  </g>

  <line x1="380" y1="220" x2="425" y2="220" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Gap Analysis -->
  <g filter="url(#ds)">
    <rect x="430" y="140" width="160" height="100" rx="8" fill="url(#cg)" stroke="#1F4E79" stroke-width="1.5"/>
    <rect x="430" y="140" width="160" height="36" rx="8" fill="#1F4E79"/>
    <rect x="430" y="160" width="160" height="16" fill="#1F4E79"/>
    <text x="510" y="163" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Gap Analysis</text>
    <text x="510" y="197" text-anchor="middle" fill="#2C3E50" font-size="10">Identify missing docs</text>
    <text x="510" y="212" text-anchor="middle" fill="#2C3E50" font-size="10">per mandatory checklist</text>
    <text x="510" y="227" text-anchor="middle" fill="#2C3E50" font-size="10">by account &amp; doc type</text>
  </g>

  <!-- Unmatched residual -->
  <g filter="url(#ds)">
    <rect x="430" y="260" width="160" height="50" rx="6" fill="#fff5f5" stroke="#c0392b" stroke-width="1.2"/>
    <text x="510" y="282" text-anchor="middle" fill="#c0392b" font-size="10" font-weight="700">UNMATCHED RESIDUAL</text>
    <text x="510" y="300" text-anchor="middle" fill="#2C3E50" font-size="16" font-weight="700">~3%</text>
  </g>

  <line x1="510" y1="310" x2="510" y2="330" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="510" y1="340" x2="625" y2="240" stroke="#2A7F62" stroke-width="1.5" marker-end="url(#arrT)"/>

  <!-- RAG Pipeline block -->
  <g filter="url(#ds)">
    <rect x="620" y="140" width="160" height="160" rx="8" fill="url(#cg)" stroke="#2A7F62" stroke-width="1.8"/>
    <rect x="620" y="140" width="160" height="36" rx="8" fill="#2A7F62"/>
    <rect x="620" y="160" width="160" height="16" fill="#2A7F62"/>
    <text x="700" y="163" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700">RAG Pipeline</text>
    <rect x="636" y="188" width="128" height="22" rx="4" fill="#e8f5f0" stroke="#2A7F62" stroke-width="0.8"/>
    <text x="700" y="203" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="600">R: Retrieve via vectors</text>
    <rect x="636" y="216" width="128" height="22" rx="4" fill="#e8f0fe" stroke="#1F4E79" stroke-width="0.8"/>
    <text x="700" y="231" text-anchor="middle" fill="#1F4E79" font-size="9.5" font-weight="600">A: Augment SLM prompt</text>
    <rect x="636" y="244" width="128" height="22" rx="4" fill="#e8f5f0" stroke="#2A7F62" stroke-width="0.8"/>
    <text x="700" y="259" text-anchor="middle" fill="#2A7F62" font-size="9.5" font-weight="600">G: Generate + explain</text>
  </g>

  <!-- HITL review -->
  <g filter="url(#ds)">
    <rect x="630" y="320" width="140" height="50" rx="6" fill="#fef9e7" stroke="#d4a017" stroke-width="1.2"/>
    <text x="700" y="342" text-anchor="middle" fill="#8a6d00" font-size="10" font-weight="700">HUMAN-IN-THE-LOOP</text>
    <text x="700" y="358" text-anchor="middle" fill="#2C3E50" font-size="10">Review + approve</text>
  </g>

  <line x1="780" y1="220" x2="810" y2="220" stroke="#1F4E79" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Transfer -->
  <g filter="url(#ds)">
    <rect x="815" y="155" width="110" height="130" rx="8" fill="#1F4E79"/>
    <text x="870" y="190" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Validated</text>
    <text x="870" y="207" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Transfer</text>
    <text x="870" y="224" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Package</text>
    <line x1="835" y1="235" x2="905" y2="235" stroke="#ffffff" stroke-width="0.5" opacity="0.4"/>
    <text x="870" y="255" text-anchor="middle" fill="#c8dff0" font-size="10">EA80 Format</text>
    <text x="870" y="270" text-anchor="middle" fill="#c8dff0" font-size="10">Secure FTP</text>
  </g>

  <rect x="30" y="390" width="880" height="22" rx="4" fill="#e8f0fe"/>
  <text x="470" y="405" text-anchor="middle" fill="#1F4E79" font-size="10" font-weight="600">Three-tier cascade: Tiers 1 &amp; 2 resolve ~97% via joins &amp; scoring → RAG Pipeline handles only the ~3% residual with SLM explanation + human review</text>
</svg>
